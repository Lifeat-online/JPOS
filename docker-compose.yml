name: mase-pos

services:
  # MariaDB Database
  mariadb:
    image: mariadb:11
    container_name: masepos-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${DB_DATABASE:-jimmy_pos}
      MYSQL_USER: ${MARIADB_USER:-pos_user}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD must be set}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # POS Application (Node.js + React)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    container_name: masepos-app
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      # Database
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-pos_user}
      DB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD must be set}
      DB_DATABASE: ${DB_DATABASE:-jimmy_pos}
      DB_CONNECTION_LIMIT: 10

      # JWT — operator must set in .env.docker.local
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (min 32 chars)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}

      # PayFast — operator must set in .env.docker.local
      PAYFAST_MERCHANT_ID: ${PAYFAST_MERCHANT_ID:-}
      PAYFAST_MERCHANT_KEY: ${PAYFAST_MERCHANT_KEY:-}
      PAYFAST_PASSPHRASE: ${PAYFAST_PASSPHRASE:-}
      PAYFAST_SANDBOX: ${PAYFAST_SANDBOX:-true}

      # App Config
      NODE_ENV: production
      BASE_PATH: ${BASE_PATH:-/}
      VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})\" "]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    read_only: false
    tmpfs:
      - /tmp

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: masepos-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - pos-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE

volumes:
  mariadb_data:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local

networks:
  pos-network:
    driver: bridge
