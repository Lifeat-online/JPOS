worker_processes auto;
# Use absolute path for error log
error_log "c:/Program Files/Herd/resources/app.asar.unpacked/resources/bin/nginx/logs/error.log" warn;
pid "c:/Program Files/Herd/resources/app.asar.unpacked/resources/bin/nginx/logs/nginx.pid";

events {
  worker_connections 1024;
}

http {
  # Use mime.types from the Herd Nginx installation
  include       "c:/Program Files/Herd/resources/app.asar.unpacked/resources/bin/nginx/conf/mime.types";
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen 80;
    server_name localhost;

    # Windows path to built frontend (dist folder)
    root "c:/Users/Phoenix/Downloads/jims-pos/dist";
    index index.html;

    # Proxy API requests to Node.js backend
    location = /api {
      return 308 /api/;
    }

    location ^~ /api/ {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Serve frontend routes (SPA fallback)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
