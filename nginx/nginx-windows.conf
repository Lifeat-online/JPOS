# nginx config template for MasePOS on Windows (Herd / native nginx).
#
# This file is intentionally NOT committed to the repository because the
# nginx binary location and the dist path are machine-specific. To use it:
#
#   1. Copy this file to nginx/nginx-windows.local.conf
#   2. Replace __NGINX_DIR__ with the directory containing nginx.exe
#      (e.g. "c:/Program Files/Herd/resources/app.asar.unpacked/resources/bin/nginx")
#   3. Replace __DIST_DIR__ with the absolute path to your built frontend
#      (e.g. "c:/Users/<you>/path/to/jims-pos/dist")
#   4. Start nginx:  nginx -p "$(pwd)/temp" -c "$(pwd)/nginx/nginx-windows.local.conf"
#
# This template deliberately omits security headers, rate limiting, and gzip
# (which are present in nginx-docker.conf). Add them locally if needed.

worker_processes auto;
# Replace __NGINX_DIR__ with the directory that contains nginx.exe
error_log "__NGINX_DIR__/logs/error.log" warn;
pid       "__NGINX_DIR__/logs/nginx.pid";

events {
  worker_connections 1024;
}

http {
  # Replace __NGINX_DIR__ with the directory that contains nginx.exe
  include       "__NGINX_DIR__/conf/mime.types";
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen 80;
    server_name localhost;

    # Replace __DIST_DIR__ with the absolute path to your built frontend
    root "__DIST_DIR__";
    index index.html;

    # Proxy API requests to Node.js backend
    location = /api {
      return 308 /api/;
    }

    location ^~ /api/ {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # Serve frontend routes (SPA fallback)
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
